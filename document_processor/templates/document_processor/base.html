<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document Processor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'document_processor:dashboard' %}">Document Processor</a>
        <div class="navbar-nav">
          <a class="nav-link" href="{% url 'document_processor:upload' %}">User Upload</a>
          <a class="nav-link" href="{% url 'document_processor:user-history' %}">User History</a>
          <a class="nav-link" href="{% url 'document_processor:admin-dashboard' %}">Admin Portal</a>
        </div>
      </div>
    </nav>

    <main class="container pb-5">
      </div>
    </nav>
    <main class="container">
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
