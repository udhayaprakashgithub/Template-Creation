{% extends 'document_processor/base.html' %}
{% block content %}
<h3>User Upload</h3>
<p class="text-muted">Only admin-configured template types are listed.</p>
<form method="post" enctype="multipart/form-data" class="card card-body">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn btn-primary" type="submit">Upload and Continue</button>
<h3>Upload PDF Documents</h3>
<form method="post" enctype="multipart/form-data" class="card card-body">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn btn-primary" type="submit">Upload</button>
</form>
{% endblock %}
