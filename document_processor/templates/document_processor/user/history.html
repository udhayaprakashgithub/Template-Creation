{% extends 'document_processor/base.html' %}
{% block content %}
<h3>Document History</h3>
<table class="table table-striped">
  <thead><tr><th>File</th><th>Template</th><th>Status</th><th>Actions</th></tr></thead>
  <tbody>
    {% for doc in object_list %}
      <tr>
        <td>{{ doc.original_filename }}</td>
        <td>{{ doc.template_type.name }}</td>
        <td>{{ doc.get_status_display }}</td>
        <td><a href="{% url 'document_processor:preview' doc.id %}" class="btn btn-sm btn-outline-primary">Open</a></td>
      </tr>
    {% empty %}
      <tr><td colspan="4">No documents uploaded.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
