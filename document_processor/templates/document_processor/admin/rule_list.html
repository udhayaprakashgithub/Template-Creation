{% extends 'document_processor/base.html' %}
{% block content %}
<div class="d-flex justify-content-between"><h3>Extraction Rules</h3><a class="btn btn-primary" href="{% url 'document_processor:admin-rule-create' %}">New Rule</a></div>
<table class="table mt-3"><tr><th>Type</th><th>Source</th><th>Target</th><th></th></tr>
{% for obj in object_list %}<tr><td>{{ obj.rule_type }}</td><td>{{ obj.source_key }}</td><td>{{ obj.target_field }}</td><td><a href="{% url 'document_processor:admin-rule-edit' obj.id %}">Edit</a></td></tr>{% endfor %}
</table>
{% endblock %}
