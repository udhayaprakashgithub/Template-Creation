{% extends 'document_processor/base.html' %}
{% block content %}
<h3>User Management</h3>
<table class="table"><tr><th>Username</th><th>Email</th><th>Role</th></tr>
{% for user in object_list %}<tr><td>{{ user.username }}</td><td>{{ user.email }}</td><td>{{ user.profile.role|default:'-' }}</td></tr>{% endfor %}
</table>
{% endblock %}
